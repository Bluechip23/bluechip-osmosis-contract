name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --tests -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

  wasm:
    name: Compile WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: |
          cargo build --target wasm32-unknown-unknown --release -p creator-pool
          cargo build --target wasm32-unknown-unknown --release -p factory
          cargo build --target wasm32-unknown-unknown --release -p router

  # Gate against shipping a test-weakened wasm (see SECURITY_AUDIT.md, build hygiene).
  # The canonical artifacts/factory.wasm that deploy tooling loads is produced
  # by the optimizer build named "prod", which MUST have empty features. This
  # job fails if that build ever gains `integration_short_timing`, and proves
  # the no-features config compiles.
  prod-artifact-guard:
    name: Prod Artifact Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Assert the deployable 'prod' optimizer build has no test features
        run: python3 ci/check_prod_build.py
      - name: Prove the production (no-features) wasm compiles
        run: |
          cargo build --target wasm32-unknown-unknown --release -p factory --no-default-features
