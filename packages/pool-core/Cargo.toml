[package]
name = "pool-core"
version.workspace = true
authors = ["Bluechip"]
edition = "2021"
description = "Shared AMM + liquidity-position core for Bluechip pools"
license = "Apache-2.0"
repository = "https://github.com/Bluechip23/bluechip-osmosis-contract"

# Pure library crate — no #[entry_point]s. Consumed by `creator-pool`,
# which provides its own entry points and dispatches into these shared
# handler functions. Exporting both `rlib` and `cdylib` is
# unnecessary: only `rlib` is needed for library consumption.
[lib]
crate-type = ["rlib"]

[features]
# for more explicit tests, cargo test --features=backtraces
backtraces = []

[dependencies]
cosmwasm-schema = { workspace = true }
cw2 = { workspace = true }
cw20 = { workspace = true }
cosmwasm-std = { workspace = true }
cw-storage-plus = { workspace = true }
osmosis-std = { workspace = true }
thiserror = { workspace = true }
pool-factory-interfaces = { path = "../pool-factory-interfaces" }
cw-utils = { workspace = true }

[dev-dependencies]
cw-multi-test = { workspace = true }
easy-addr = { workspace = true }
cw20-base = { workspace = true }
